@if(tipo() == undefined) {
<app-seleciona-cor (selecionado)="selecionaTipo($event)"></app-seleciona-cor>

} @else {
<div class="text-center fs-3">
    Você está com as {{tipo()}}
</div>

<div class="d-flex justify-content-center align-items-center">
    <div class="relogio">
        <app-temporizador [tempo]="300" #relogioBrancas></app-temporizador>
    </div>
    <app-tabuleiro [pecas]="jogo.pecas()" [tipo]="tipo()">OK</app-tabuleiro>
    <div class="relogio">
        <app-temporizador [tempo]="300" #relogioPretas></app-temporizador>
    </div>
</div>

}

<div class="border rounded mt-3 py-3">
    <div class="text-center">
        <button class="btn btn-success me-2" type="button" (click)="iniciar()">Iniciar</button>
        <button class="btn btn-success" type="button" (click)="parar()">Pausar</button>
        <button class="btn btn-success" type="button" (click)="passar()">Passar</button>
        <button class="btn btn-success" type="button" (click)="alternar()">alternar</button>
    </div>
</div>
